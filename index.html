<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./pages/index.css">
    <title>Место</title>
</head>

<body class="page">
    <header class="header">
        <div class="header__logo"></div>
    </header>

    <main class="contet">
        <section class="profile">
            <img class="profile__avatar" src="./images/Avatar-image.jpg" alt="Фотография профиля.">
            <div class="profile__info">
                <h1 class="profile__name">Жак-Ив Кусто</h1>
                <button class="profile__button-edit" type="button"></button>
                <p class="profile__description">Исследователь океана</p>
            </div>
            <button class="profile__button-add" type="button"></button>
        </section>

        <section class="elements"></section>

    </main>

    <footer class="footer">
        <p class="footer__copyright">&commat; 2022 Mesto Russia</p>
    </footer>

    <template id="element-template">
        <article class="elements__card">
            <img class="elements__image" alt="#">
            <div class="elements__container">
                <h2 class="elements__title"></h2>
                <button class="elements__button-like" type="button"></button>
            </div>
            <button class="elements__button-delete" type="button"></button>
        </article>
    </template>

    <div class="popup popup_edit-form">
        <div class="popup__container">
            <h2 class="popup__title">Редактировать профиль</h2>
            <form class="popup__form" name="form" novalidate>
                <input class="popup__input popup__input_type_name" name="input-name" type="text" placeholder="Имя"
                    minlength="2" maxlength="40" required>
                <span class="input-name-error popup__input-error"></span>
                <input class="popup__input popup__input_type_job" name="job-input" type="text" placeholder="Описание"
                    minlength="2" maxlength="200" required>
                <span class="job-input-error popup__input-error"></span>
                <button class="popup__button-submit popup__submit" type="submit">Сохранить</button>
            </form>
            <button class="popup__button-close" type="button"></button>
        </div>
    </div>

    <div class="popup popup_add-form">
        <div class="popup__container">
            <h2 class="popup__title">Новое место</h2>
            <form class="popup__form" name="form" id="card-name" novalidate>
                <input class="popup__input popup__input_type_title" name="input-title" type="text"
                    placeholder="Название" minlength="2" maxlength="30" required>
                <span class="input-title-error popup__input-error"></span>
                <input class="popup__input popup__input_type_link" name="input-link" type="text"
                    placeholder="Ссылка на картинку" required>
                <span class="input-link-error popup__input-error"></span>
                <button class="popup__button-submit popup__submit" type="submit">Создать</button>
            </form>
            <button class="popup__button-close" type="button"></button>
        </div>
    </div>

    <div class="popup popup_image-form">
        <figure class="popup__image-container">
            <img class="popup__image-place" src="#" alt="#">
            <figcaption class="popup__image-title"></figcaption>
            <button class="popup__button-close" type="button"></button>
        </figure>
    </div>
    
    <script src="./scripts/cards.js"></script>
    <script src="./scripts/validate.js"></script>
    <script src="./scripts/index.js"></script>
</body>

</html>
