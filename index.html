<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./pages/index.css">
    <title>Место</title>
</head>

<body class="page">
    <header class="header">
        <div class="header__logo"></div>
    </header>

    <main class="contet">
        <section class="profile">
            <img class="profile__avatar" src="./images/Avatar-image.jpg" alt="Фотография профиля.">
            <div class="profile__info">
                <h1 class="profile__name">Жак-Ив Кусто</h1>
                <button class="profile__button-edit" type="button"></button>
                <p class="profile__description">Исследователь океана</p>
            </div>
            <button class="profile__button-add" type="button"></button>
        </section>

        <section class="elements">

            <article class="elements__card">
                <img class="elements__image" src="./images/kirill-pershin-1088404-unsplash.jpg"
                    alt="Старая, полуразрушенная крепость в горах.">
                <div class="elements__container">
                    <h2 class="elements__title">Карачаевск</h2>
                    <button class="elements__button-like" type="button"></button>
                </div>
            </article>

            <article class="elements__card">
                <img class="elements__image" src="./images/kirill-pershin-1404681-unsplash.png"
                    alt="Степь, закат. В далеке виднеются горы.">
                <div class="elements__container">
                    <h2 class="elements__title">Домбай</h2>
                    <button class="elements__button-like" type="button"></button>
                </div>
            </article>

            <article class="elements__card">
                <img class="elements__image" src="./images/kirill-pershin-1556355-unsplash.png"
                    alt="Вид на высокие заснеженные горы.">
                <div class="elements__container">
                    <h2 class="elements__title">Гора Эльбрус</h2>
                    <button class="elements__button-like" type="button"></button>
                </div>
            </article>

            <article class="elements__card">
                <img class="elements__image" src="./images/kirill-pershin-1088404-unsplash.jpg"
                    alt="Старая, полуразрушенная крепость в горах">
                <div class="elements__container">
                    <h2 class="elements__title">Карачаево-Черкесия</h2>
                    <button class="elements__button-like" type="button"></button>
                </div>
            </article>

            <article class="elements__card">
                <img class="elements__image" src="./images/kirill-pershin-1404681-unsplash.png"
                    alt="Степь, закат. В далеке виднеются горы.">
                <div class="elements__container">
                    <h2 class="elements__title">Домбай</h2>
                    <button class="elements__button-like" type="button"></button>
                </div>
            </article>

            <article class="elements__card">
                <img class="elements__image" src="./images/kirill-pershin-1556355-unsplash.png"
                    alt="Вид на высокие заснеженные горы.">
                <div class="elements__container">
                    <h2 class="elements__title">Гора Эльбрус</h2>
                    <button class="elements__button-like" type="button"></button>
                </div>
            </article>
        </section>

        <footer class="footer">
            <p class="footer__copyright">&commat; 2022 Mesto Russia</p>
        </footer>

        <div class="popup">
            <div class="popup__container">
                <h2 class="popup__title">Редактировать профиль</h2>
                <form class="popup__form" name="form">
                    <input class="popup__input popup__input_type_name" name="input-name" type="text" placeholder="Имя">
                    <input class="popup__input popup__input_type_job" name="job-input" type="text"
                        placeholder="Описание">
                    <button class="popup__button-submit" type="submit">Сохранить</button>
                </form>
                <button class="popup__button-close" type="button"></button>
            </div>
        </div>

    </main>
    <script src="./scripts/index.js"></script>
</body>

</html>
